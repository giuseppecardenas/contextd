version: "3.9"
services:
  memgraph:
    image: memgraph/memgraph:latest
    container_name: contextd-memgraph
    restart: unless-stopped
    ports:
      - "127.0.0.1:7687:7687"
    volumes:
      - contextd_memgraph_data:/var/lib/memgraph
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
volumes:
  contextd_memgraph_data:

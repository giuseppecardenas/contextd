# Docker Compose template deployed by `contextd init` to ~/.contextd/docker-compose.yml.
# `contextd up` starts the neo4j service via `docker compose --profile neo4j up -d`.
services:
  neo4j:
    image: neo4j:5.15-community
    profiles: ["neo4j"]
    ports:
      - "127.0.0.1:7687:7687"
      - "127.0.0.1:7474:7474"
    environment:
      NEO4J_AUTH: "neo4j/contextd"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - contextd_neo4j_data:/data
      - contextd_neo4j_logs:/logs
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
    restart: unless-stopped

volumes:
  contextd_neo4j_data:
  contextd_neo4j_logs:

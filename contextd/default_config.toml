[providers]
# Inference provider per call-site. Each independently picks "gemini" or
# "openai_compat" (any local OpenAI-compatible HTTP server: Ollama, LM
# Studio, vLLM, LocalAI). Embeddings stay on Voyage.
summary = "gemini"
inference = "gemini"
translation = "gemini"
embedding = "voyage"

[providers.gemini]
model_summary = "gemma-4-31b-it"
model_inference = "gemma-4-31b-it"
model_translation = "gemma-4-31b-it"
max_retries = 5
safety_block = "BLOCK_NONE"
daily_budget = "unlimited"

[providers.openai_compat]
base_url = "http://localhost:11434/v1"
# Set api_key_env = "OPENAI_API_KEY" (or any env var) for servers that
# require a bearer token. Leave unset for keyless local servers.
model_summary = "qwen2.5:7b-instruct"
model_inference = "qwen2.5:14b-instruct"
model_translation = "qwen2.5:14b-instruct"
max_retries = 5
request_timeout_seconds = 120.0
json_mode = true

[providers.voyage]
model = "voyage-4-large"
max_batch_size = 128

[storage]
backend = "neo4j"

[storage.memgraph]
host = "127.0.0.1"
port = 7687
docker_compose_file = "~/.contextd/docker-compose.yml"
memory_limit_gb = 1.0
cpu_limit = 1.0

[inference]
summary_max_words = 100

[indexer]
debounce_seconds = 30
git_lock_check = true
parallel_embedding_batches = 4
allowed_branches = []
incremental_workers = 4
sweep_interval_seconds = 900
sweep_rate_sections_per_second = 0.017

[mcp]
transport = "stdio"

[logging]
level = "info"
format = "json"
path = "~/.contextd/logs/contextd.log"
max_log_bytes = 10485760
log_backup_count = 5

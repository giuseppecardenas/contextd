[providers]
# Inference provider per call-site. Each independently picks "gemini" or
# "openai_compat" (any local OpenAI-compatible HTTP server: Ollama, LM
# Studio, vLLM, llama.cpp's server, LocalAI). The embedding provider picks
# "voyage" (cloud) or "openai_compat" (local /embeddings endpoint). Setting
# every call-site plus embedding to "openai_compat" runs the whole indexing
# pipeline offline with no cloud API calls.
summary = "gemini"
inference = "gemini"
translation = "gemini"
embedding = "voyage"

[providers.gemini]
model_summary = "gemma-4-31b-it"
model_inference = "gemma-4-31b-it"
model_translation = "gemma-4-31b-it"
max_retries = 5
safety_block = "BLOCK_NONE"
daily_budget = "unlimited"

[providers.openai_compat]
base_url = "http://localhost:11434/v1"
# Set api_key_env = "OPENAI_API_KEY" (or any env var) for servers that
# require a bearer token. Leave unset for keyless local servers.
model_summary = "qwen2.5:7b-instruct"
model_inference = "qwen2.5:14b-instruct"
model_translation = "qwen2.5:14b-instruct"
max_retries = 5
request_timeout_seconds = 120.0
json_mode = true

[providers.voyage]
model = "voyage-4-large"
max_batch_size = 128

[providers.openai_compat_embedding]
# Used only when providers.embedding = "openai_compat". Points at a local
# OpenAI-compatible /embeddings endpoint (llama.cpp server, Ollama, vLLM, ...).
base_url = "http://localhost:11434/v1"
# Leave api_key_env unset for keyless local servers; set it to an env var
# name (e.g. "OPENAI_API_KEY") for servers that require a bearer token.
# dimensions MUST match the vector-index width in the migrations (1024). The
# default model emits 1024-dim vectors and drops into the existing index;
# a different-width model requires editing the migration DDL on both backends.
model = "mxbai-embed-large"
dimensions = 1024
max_batch_size = 64
max_retries = 5
request_timeout_seconds = 120.0

[storage]
backend = "neo4j"

[storage.neo4j]
host = "127.0.0.1"
port = 7687
user = "neo4j"
password = "contextd"
docker_compose_file = "~/.contextd/docker-compose.yml"
memory_limit_gb = 1.0
cpu_limit = 1.0

[inference]
summary_max_words = 100

[indexer]
debounce_seconds = 30
git_lock_check = true
parallel_embedding_batches = 4
allowed_branches = []
incremental_workers = 4
sweep_interval_seconds = 900
sweep_rate_sections_per_second = 0.017

[mcp]
transport = "stdio"

[logging]
level = "info"
format = "json"
path = "~/.contextd/logs/contextd.log"
max_log_bytes = 10485760
log_backup_count = 5
